<!DOCTYPE html>
<html lang="id">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0e13">
<title>GYM PRO - Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--primary:#00e676;--primary-dark:#00c853;--secondary:#448aff;--warning:#ffab40;--danger:#ff5252;--bg-primary:#0a0e13;--bg-secondary:#111820;--bg-card:#151d28;--border:#2a3444;--text-primary:#e8edf4;--text-secondary:#8899aa;--text-muted:#556677;--shadow-sm:0 2px 8px rgba(0,0,0,.2);--shadow-md:0 4px 16px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.4);--shadow-glow:0 0 20px rgba(0,230,118,.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--transition-fast:.2s cubic-bezier(.4,0,.2,1);--transition-smooth:.3s cubic-bezier(.4,0,.2,1);--transition-bounce:.5s cubic-bezier(.68,-.55,.265,1.55)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg-primary);color:var(--text-primary);-webkit-tap-highlight-color:transparent;overflow-x:hidden;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg-secondary)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::selection{background:rgba(0,230,118,.2)}
/* Loading */
#ldOv{position:fixed;inset:0;background:var(--bg-primary);z-index:9999;display:flex;justify-content:center;align-items:center;flex-direction:column;gap:16px}
.loader{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:14px;color:var(--text-secondary);animation:ptxt 1.5s ease-in-out infinite}
@keyframes ptxt{0%,100%{opacity:.5}50%{opacity:1}}
/* Login */
.lbg{min-height:100vh;min-height:100dvh;display:flex;position:relative;overflow:hidden;background:var(--bg-primary)}
.lbg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(0,230,118,.08),transparent 70%);top:-100px;left:-100px;animation:fbg 10s ease-in-out infinite}
.lbg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(68,138,255,.06),transparent 70%);bottom:-80px;right:-80px;animation:fbg 8s ease-in-out infinite reverse}
@keyframes fbg{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-30px) scale(1.1)}}
.lp{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;z-index:1}
.lf{flex:1;display:flex;justify-content:center;align-items:center;padding:20px;background:linear-gradient(145deg,#111820,#1a2230)}
.lc{background:rgba(17,24,32,.96);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;width:100%;max-width:400px;backdrop-filter:blur(20px);box-shadow:var(--shadow-lg)}
/* Form */
.ig{position:relative;margin-bottom:16px}
.ig i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);transition:all var(--transition-smooth);font-size:14px;z-index:2;pointer-events:none}
.ig:focus-within i{color:var(--primary);transform:translateY(-50%) scale(1.1)}
.inf{width:100%;background:var(--bg-primary);border:2px solid var(--border);border-radius:var(--radius-md);padding:14px 16px 14px 44px;color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;transition:all var(--transition-smooth)}
.inf:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(0,230,118,.1)}
.inf::placeholder{color:var(--text-muted);opacity:.7}
.bp{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--bg-primary);border:none;border-radius:var(--radius-md);padding:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all var(--transition-smooth);position:relative;overflow:hidden}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,230,118,.3)}
.bp:active{transform:translateY(0)}
/* Sidebar */
.sb{position:fixed;left:0;top:0;bottom:0;width:250px;background:linear-gradient(180deg,var(--bg-secondary),var(--bg-primary));border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column;transition:transform var(--transition-smooth);box-shadow:var(--shadow-md)}
.sbl{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sbl .lg{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--bg-primary);box-shadow:var(--shadow-glow)}
.sbn{flex:1;overflow-y:auto;padding:8px 6px}
.nl{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;padding:16px 12px 6px}
.ni{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);margin-bottom:3px;font-size:14px;font-weight:500;position:relative}
.ni:hover{background:rgba(0,230,118,.05);color:var(--text-primary);transform:translateX(4px)}
.ni.ac{background:rgba(0,230,118,.1);color:var(--primary);font-weight:600}
.ni.ac::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--primary);border-radius:0 3px 3px 0;box-shadow:0 0 10px rgba(0,230,118,.3)}
.ni i{width:22px;text-align:center;font-size:16px;transition:color var(--transition-fast)}
/* Date/time picker icon white for dark theme */
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(1) brightness(1.8);cursor:pointer;opacity:.7}
input[type="date"]::-webkit-calendar-picker-indicator:hover,
input[type="time"]::-webkit-calendar-picker-indicator:hover{opacity:1}
.sbf{padding:12px 10px;border-top:1px solid var(--border)}
/* Main */
.mc{margin-left:250px;min-height:100vh;min-height:100dvh;transition:margin var(--transition-smooth)}
.tb{position:sticky;top:0;z-index:40;background:rgba(10,14,19,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.pc{padding:24px 20px 32px}
/* Stats cards */
.sc{background:linear-gradient(145deg,var(--bg-secondary),var(--bg-card));border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;transition:all var(--transition-smooth);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:0;transition:opacity var(--transition-smooth)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg),var(--shadow-glow);border-color:rgba(0,230,118,.2)}
.sc:hover::before{opacity:1}
/* Buttons */
.bs{padding:8px 14px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;border:1px solid;cursor:pointer;transition:all var(--transition-smooth);display:inline-flex;align-items:center;gap:5px;font-family:inherit;min-height:36px;letter-spacing:.3px}
.bs.g{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.2);color:var(--primary)}
.bs.g:hover{background:rgba(0,230,118,.15);box-shadow:var(--shadow-glow)}
.bs.b{background:rgba(68,138,255,.08);border-color:rgba(68,138,255,.2);color:var(--secondary)}
.bs.b:hover{background:rgba(68,138,255,.15)}
.bs.r{background:rgba(255,82,82,.08);border-color:rgba(255,82,82,.2);color:var(--danger)}
.bs.r:hover{background:rgba(255,82,82,.15)}
.ba{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--bg-primary);border:none;border-radius:var(--radius-sm);padding:10px 20px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all var(--transition-smooth);display:inline-flex;align-items:center;gap:6px;min-height:40px}
.ba:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,230,118,.25)}
/* Notification System */
.tc{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:none;max-width:380px}
.ntf{pointer-events:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 44px 18px 14px;display:flex;align-items:flex-start;gap:12px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);overflow:hidden;position:relative}
.ntf-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.ntf-bd{flex:1;min-width:0}
.ntf-ti{font-size:13px;font-weight:700;letter-spacing:.2px}
.ntf-ms{font-size:11px;color:var(--text-secondary);margin-top:3px;line-height:1.4}
.ntf-cl{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.07);border:none;color:var(--text-secondary);cursor:pointer;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:.2s}
.ntf-cl:hover{background:rgba(255,255,255,.14);color:var(--text-primary)}
.ntf-bar{position:absolute;bottom:0;left:0;height:3px;width:100%;transform-origin:left}
.ntf-s .ntf-ic{background:rgba(0,230,118,.15);color:#00e676}.ntf-s .ntf-ti{color:#00e676}.ntf-s .ntf-bar{background:#00e676}
.ntf-e .ntf-ic{background:rgba(255,82,82,.15);color:#ff5252}.ntf-e .ntf-ti{color:#ff5252}.ntf-e .ntf-bar{background:#ff5252}
.ntf-w .ntf-ic{background:rgba(255,171,64,.15);color:#ffab40}.ntf-w .ntf-ti{color:#ffab40}.ntf-w .ntf-bar{background:#ffab40}
.ntf-i .ntf-ic{background:rgba(68,138,255,.15);color:#448aff}.ntf-i .ntf-ti{color:#448aff}.ntf-i .ntf-bar{background:#448aff}
/* Button spinner */
button.ld{opacity:.75;cursor:wait;pointer-events:none}
/* Confirm dialog */
.cfm-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.cfm-ov.sh{display:flex}
.cfm-bx{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:380px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.cfm-ic{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px}
.cfm-ti{font-size:16px;font-weight:700;margin-bottom:8px}
.cfm-ms{font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:20px}
.cfm-ac{display:flex;gap:10px;justify-content:center}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.mo.sh{display:flex}
.mbx{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mm{padding:20px;overflow-y:auto;flex:1}
.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
/* Notification panel */
.nov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:none;opacity:0}
.nov.sh{display:block}
.np{position:fixed;right:-380px;top:0;bottom:0;width:380px;background:var(--bg-secondary);border-left:1px solid var(--border);z-index:70;display:flex;flex-direction:column;transition:right var(--transition-smooth);box-shadow:var(--shadow-lg)}
.np.op{right:0}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,24,32,.96);border-top:1px solid var(--border);z-index:50;backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom)}
.bnvi{display:flex;align-items:stretch}
.bnvd{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;color:var(--text-muted);cursor:pointer;transition:all var(--transition-fast);font-size:9px;gap:3px;position:relative}
.bnvd:hover,.bnvd.ac{color:var(--primary)}
.bnvd i{font-size:17px}
.bnb{position:absolute;top:4px;right:calc(50% - 16px);background:var(--danger);color:#fff;font-size:8px;font-weight:800;width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center}
/* FAB */
.fab{position:fixed;bottom:76px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--bg-primary);border:none;font-size:22px;cursor:pointer;z-index:48;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,230,118,.3);transition:all var(--transition-smooth)}
.fab:hover{transform:scale(1.1) rotate(90deg)}
/* Search */
.sr{position:relative;display:flex;align-items:center}
.sr i{position:absolute;left:12px;color:var(--text-muted);font-size:13px;pointer-events:none}
.sr input{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px 8px 34px;color:var(--text-primary);font-size:12px;outline:none;width:100%;font-family:inherit;transition:border-color var(--transition-fast)}
.sr input:focus{border-color:var(--primary)}
/* Data Table */
.dtw{background:#111820;border:1px solid #2a3444;border-radius:12px;overflow:hidden}
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;background:var(--bg-secondary);white-space:nowrap;border-bottom:1px solid var(--border)}
.dt td{padding:10px 14px;border-bottom:1px solid rgba(42,52,68,.3);color:var(--text-secondary);vertical-align:middle}
.dt tr:hover td{background:rgba(0,230,118,.02);color:var(--text-primary)}
/* Chart card */
.cc{background:linear-gradient(145deg,var(--bg-secondary),var(--bg-card));border:1px solid var(--border);border-radius:var(--radius-md);padding:20px}
.cc h3{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text-secondary)}
/* Stat icons */
.si{width:40px;height:40px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.si.g{background:rgba(0,230,118,.1);color:var(--primary)}.si.b{background:rgba(68,138,255,.1);color:var(--secondary)}.si.o{background:rgba(255,171,64,.1);color:var(--warning)}.si.r{background:rgba(255,82,82,.1);color:var(--danger)}
.sv{font-size:28px;font-weight:700;margin-bottom:4px}.sl{font-size:11px;color:var(--text-muted)}
/* Badges */
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bg-g{background:rgba(0,230,118,.1);color:var(--primary);border:1px solid rgba(0,230,118,.2)}
.bg-r{background:rgba(255,82,82,.1);color:var(--danger);border:1px solid rgba(255,82,82,.2)}
.bg-b{background:rgba(68,138,255,.1);color:var(--secondary);border:1px solid rgba(68,138,255,.2)}
.bg-o{background:rgba(255,171,64,.1);color:var(--warning);border:1px solid rgba(255,171,64,.2)}
.bg-x{background:rgba(136,153,170,.1);color:var(--text-secondary);border:1px solid rgba(136,153,170,.2)}
/* Empty state */
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--text-muted);text-align:center}
.es i{font-size:36px;opacity:.3}.es p{font-size:13px}
/* Mobile cards */
.mcw{display:none}
.mcl{display:flex;flex-direction:column;gap:8px}
.mci{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px}
.mci-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mci-acts{display:flex;gap:6px;margin-top:10px}
/* Notification items */
.nti{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--transition-fast)}
.nti:hover{background:rgba(0,230,118,.03)}
.nti.unr{border-left:3px solid var(--primary)}
/* Form groups */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text-primary);font-size:13px;outline:none;font-family:inherit;transition:border-color var(--transition-fast)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary)}
.fg select option{background:var(--bg-card)}
/* Responsive */
@media(max-width:768px){
  .sb{transform:translateX(-100%)}
  .sb.op{transform:translateX(0)}
  .mc{margin-left:0}
  .pc{padding:16px 12px 96px}
  .tb{padding:0 12px;height:48px}
  .lp{display:none}
  .lf{padding:16px}
  .lc{padding:28px 20px}
  .dtw{display:none}
  .mcw{display:block}
  #mnB{display:block!important}
}
@media(min-width:769px){.bnav,.fab{display:none!important}}
</style>
</head>
<body>

<div id="ldOv">
  <div class="loader"></div>
  <p class="loader-text">Memuat GYM PRO...</p>
</div>

<!-- LOGIN -->
<div id="lgPg" class="lbg" style="display:none">
  <div class="lp">
    <div style="text-align:center;max-width:380px">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#00e676,#00c853);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:#0a0e13;margin-bottom:20px;box-shadow:0 0 40px rgba(0,230,118,.2)">G</div>
      <h1 style="font-size:40px;font-weight:700;letter-spacing:-1px">GYM <span style="color:#00e676">PRO</span></h1>
      <p style="color:#8899aa;font-size:14px;margin-top:8px">Professional Gym Management</p>
      <div style="display:flex;gap:24px;justify-content:center;margin-top:28px">
        <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#00e676">500+</div><div style="font-size:10px;color:#556677;text-transform:uppercase;letter-spacing:1px">Members</div></div>
        <div style="width:1px;background:#2a3444"></div>
        <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#448aff">50+</div><div style="font-size:10px;color:#556677;text-transform:uppercase;letter-spacing:1px">Trainers</div></div>
        <div style="width:1px;background:#2a3444"></div>
        <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#ffab40">99%</div><div style="font-size:10px;color:#556677;text-transform:uppercase;letter-spacing:1px">Rating</div></div>
      </div>
    </div>
  </div>
  <div class="lf">
    <div class="lc">
      <div style="text-align:center;margin-bottom:24px">
        <h2 style="font-size:22px;font-weight:700">Selamat Datang</h2>
        <p style="color:#8899aa;font-size:12px;margin-top:4px">Masuk ke akun Anda</p>
      </div>
      <div id="lgEr" style="display:none;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.2);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:12px;color:#ff5252"></div>
      <div class="ig"><i class="fas fa-user"></i><input type="text" id="lgU" class="inf" placeholder="Username" autocomplete="username"></div>
      <div class="ig">
        <i class="fas fa-lock"></i>
        <input type="password" id="lgP" class="inf" placeholder="Password" autocomplete="current-password">
        <button style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#556677;cursor:pointer;font-size:14px" onclick="togglePass()"><i class="fas fa-eye"></i></button>
      </div>
      <button class="bp" onclick="doLogin()" id="lgBn"><i class="fas fa-arrow-right"></i> Masuk</button>
      <p style="text-align:center;margin-top:16px;font-size:9px;color:#556677">Powered by <b style="color:#00e676">Supabase</b> + <b style="color:#8899aa">Vercel</b></p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="apPg" style="display:none">
  <aside id="sb" class="sb">
    <div class="sbl">
      <div class="lg">G</div>

// Replace Google Apps Script runner with fetch
async function gs(f) {
  var args = Array.prototype.slice.call(arguments, 1);
  var res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ fn: f, args: args })
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.message || 'Server error');
  return data;
}

function mob() { return window.innerWidth <= 768; }
function fc(n) { return 'Rp ' + (Number(n)||0).toLocaleString('id-ID'); }
function fd(d) {
  if (!d) return '-';
  try { return new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return d; }
}
function fr(d) {
  if (!d) return '';
  var diff = Math.floor((Date.now()-new Date(d))/1000);
  if (diff<60) return 'Baru saja';
  if (diff<3600) return Math.floor(diff/60)+'m lalu';
  if (diff<86400) return Math.floor(diff/3600)+'j lalu';
  return fd(d);
}
function stBg(s) {
  var m = {Active:'bg-g',Aktif:'bg-g',Expired:'bg-r',Inactive:'bg-x',Paid:'bg-g',Pending:'bg-o',Cancelled:'bg-r',Scheduled:'bg-b',Completed:'bg-g',Income:'bg-g',Expense:'bg-r',true:'bg-g',false:'bg-r'};
  return m[s] || 'bg-x';
}
function errPg(msg) {
  document.getElementById('pgC').innerHTML = '<div class="es"><i class="fas fa-exclamation-triangle" style="font-size:36px;color:#ff5252"></i><p>'+msg+'</p></div>';
}

var _ntfIc={s:'fa-check-circle',e:'fa-times-circle',w:'fa-exclamation-triangle',i:'fa-info-circle'};
var _ntfLb={s:'Berhasil',e:'Gagal',w:'Perhatian',i:'Info'};
function notify(t,title,msg){
  var c=document.getElementById('ttC');
  var el=document.createElement('div');
  el.className='ntf ntf-'+(t||'i');
  el.innerHTML=`<div class="ntf-ic"><i class="fas ${_ntfIc[t]||_ntfIc.i}"></i></div><div class="ntf-bd"><div class="ntf-ti">${title}</div>${msg?`<div class="ntf-ms">${msg}</div>`:''}</div><button class="ntf-cl" onclick="this.closest('.ntf').remove()"><i class="fas fa-times"></i></button><div class="ntf-bar"></div>`;
  c.appendChild(el);
  gsap.fromTo(el,{opacity:0,x:60,scale:.9},{opacity:1,x:0,scale:1,duration:.35,ease:'back.out(1.5)'});
  var bar=el.querySelector('.ntf-bar');
  var dur=t==='e'?6:4;
  gsap.to(bar,{scaleX:0,duration:dur,ease:'none',transformOrigin:'left',onComplete:()=>{
    gsap.to(el,{opacity:0,x:60,scale:.9,duration:.25,onComplete:()=>el.remove()});
  }});
}
function toast(m,t){
  var map={s:'s',e:'e',w:'w',i:'i'};
  var titles={s:'Berhasil',e:'Gagal',w:'Perhatian',i:'Info'};

}

function confirmAct(opts){

}

// ── Button Spinner ─────────────────────────
(function(){
  var _map=new WeakMap();
  document.addEventListener('click',function(e){
    var btn=e.target.closest('button');
    if(!btn||btn.classList.contains('ntf-cl')||btn.classList.contains('no-spin')||btn.disabled)return;
    if(!btn.getAttribute('onclick')&&!btn.form)return;
    if(_map.has(btn))return;
    var orig=btn.innerHTML;
    var ow=Math.max(btn.offsetWidth,36);
    btn.style.minWidth=ow+'px';
    btn.innerHTML='<i class="fas fa-spinner fa-spin" style="font-size:12px"></i>';
    btn.classList.add('ld');
    btn.disabled=true;
    var t=setTimeout(()=>{
      _map.delete(btn);
      btn.innerHTML=orig;btn.classList.remove('ld');btn.disabled=false;btn.style.minWidth='';
    },4000);
    _map.set(btn,{orig,t});
    // Reset when page re-renders
    var obs=new MutationObserver(()=>{
      if(!document.body.contains(btn)){clearTimeout(t);_map.delete(btn);obs.disconnect();}
    });
    obs.observe(document.body,{childList:true,subtree:true});
  },true);
})();

// ── EXPORT PDF & CSV ───────────────────────
function expCSV(){
  var d=window._rptData; if(!d){toast('Tidak ada data laporan','e');return;}
  var period=window._rptPeriod||'month';
  var pLabel=period==='month'?'Bulan Ini':period==='quarter'?'Kuartal Ini':'Tahun Ini';
  var rows=[
    ['GYM PRO - Laporan Keuangan',''],
    ['Periode',pLabel],
    ['Tanggal Unduh',new Date().toLocaleDateString('id-ID')],
    [''],
    ['RINGKASAN',''],
    ['Pemasukan',d.inc],
    ['Pengeluaran',d.exp],
    ['Net Profit',d.net],
    [''],
    ['MEMBER',''],
    ['Total Member',d.totalM],
    ['Member Aktif',d.actM],
    ['Member Expired',d.expM],
    ['Member Baru',d.newM],
    [''],
    ['PER KATEGORI',''],
    ['Kategori','Jumlah'],
    ...Object.entries(d.byCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,v]),
    [''],
    ['PER METODE BAYAR',''],
    ['Metode','Jumlah'],
    ...Object.entries(d.byMethod).map(([k,v])=>[k,v])
  ];
  var csv=rows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='laporan-gym-pro-'+period+'.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('CSV berhasil diunduh','s');
}

function expPDF(){
  var d=window._rptData; if(!d){toast('Tidak ada data laporan','e');return;}
  if(typeof window.jspdf==='undefined'){toast('PDF library belum siap, coba lagi','e');return;}
  var period=window._rptPeriod||'month';
  var pLabel=period==='month'?'Bulan Ini':period==='quarter'?'Kuartal Ini':'Tahun Ini';
  var {jsPDF}=window.jspdf;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  // Header
  doc.setFillColor(10,14,19);
  doc.rect(0,0,210,40,'F');
  doc.setTextColor(0,230,118);
  doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text('GYM PRO',14,18);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.setTextColor(136,153,170);
  doc.text('Laporan Keuangan & Statistik — '+pLabel,14,26);
  doc.text('Tanggal: '+new Date().toLocaleDateString('id-ID'),14,33);

  // Summary cards
  doc.setTextColor(30,30,30);
  var summaryData=[
    ['Pemasukan','Pengeluaran','Net Profit','Member Baru'],
    [fc(d.inc),fc(d.exp),fc(d.net),String(d.newM)+' orang']
  ];
  doc.autoTable({
    startY:48,
    head:[summaryData[0]],
    body:[summaryData[1]],
    theme:'grid',
    headStyles:{fillColor:[0,230,118],textColor:[10,14,19],fontStyle:'bold',fontSize:9},
    bodyStyles:{fontSize:10,fontStyle:'bold',halign:'center'},
    columnStyles:{2:{textColor:d.net>=0?[0,180,80]:[220,50,50]}},
    margin:{left:14,right:14}
  });

  // Member stats
  doc.autoTable({
    startY:doc.lastAutoTable.finalY+8,
    head:[['Statistik Member','Jumlah']],
    body:[
      ['Total Member',d.totalM],
      ['Member Aktif',d.actM],
      ['Member Expired',d.expM],
      ['Pembayaran Tercatat',d.totalP]
    ],
    theme:'striped',
    headStyles:{fillColor:[68,138,255],textColor:[255,255,255],fontSize:9},
    bodyStyles:{fontSize:9},
    margin:{left:14,right:110}
  });

  // Per category
  var catY=doc.lastAutoTable.finalY+8;
  doc.autoTable({
    startY:catY,
    head:[['Kategori','Jumlah (Rp)']],
    body:Object.entries(d.byCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,Number(v).toLocaleString('id-ID')]),
    theme:'striped',
    headStyles:{fillColor:[188,140,255],textColor:[255,255,255],fontSize:9},
    bodyStyles:{fontSize:9},
    margin:{left:14,right:110}
  });

  // Per method
  doc.autoTable({
    startY:catY,
    head:[['Metode Bayar','Total (Rp)']],
    body:Object.entries(d.byMethod).map(([k,v])=>[k,Number(v).toLocaleString('id-ID')]),
    theme:'striped',
    headStyles:{fillColor:[255,171,64],textColor:[10,14,19],fontSize:9},
    bodyStyles:{fontSize:9},
    margin:{left:110,right:14}
  });

  // Footer
  var pageH=doc.internal.pageSize.height;
  doc.setFontSize(8); doc.setTextColor(150,150,150);
  doc.text('GYM PRO Management System — Digenerate otomatis '+new Date().toLocaleString('id-ID'),14,pageH-8);

  doc.save('laporan-gym-pro-'+period+'.pdf');
  toast('PDF berhasil diunduh','s');
}

  if(tb)tb.innerHTML=f.length?f.slice(0,200).map(x=>`<tr><td style="font-size:10px;white-space:nowrap">${fr(x.createdAt)}</td><td><span style="font-size:12px;font-weight:600">${x.username}</span></td><td><span class="bg bg-b" style="font-size:9px">${x.action}</span></td><td style="font-size:11px;color:#8899aa">${x.detail}</td></tr>`).join(''):'<tr><td colspan="4" class="es" style="padding:40px"><i class="fas fa-history"></i><p>Tidak ada log</p></td></tr>';
  var mc=document.getElementById('logMc');
  if(mc)mc.innerHTML=f.length?f.slice(0,100).map(x=>`<div class="mci"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:600;font-size:12px">${x.username}</span><span style="font-size:9px;color:#556677">${fr(x.createdAt)}</span></div><span class="bg bg-b" style="font-size:9px;margin-bottom:6px">${x.action}</span><div style="font-size:11px;color:#8899aa;margin-top:6px">${x.detail}</div></div>`).join(''):'<div class="es"><i class="fas fa-history"></i><p>Tidak ada log</p></div>';
}

// ── USERS ──────────────────────────────────
async function rdrUsr(){
  try{
    var data=await gs('getUsers'); window._ud=data;
    var c=document.getElementById('pgC');
    c.innerHTML=`
      <div style="display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap">
        <div class="sr" style="max-width:260px"><i class="fas fa-search"></i><input type="text" id="usrSrc" placeholder="Cari pengguna..." oninput="filUsr()"></div>
        <button class="ba" onclick="addUsr()" style="display:${mob()?'none':'flex'}"><i class="fas fa-plus"></i> Tambah Pengguna</button>
      </div>
      <div class="dtw"><div style="overflow-x:auto"><table class="dt"><thead><tr><th>Username</th><th>Nama</th><th>Email</th><th>Role</th><th>Status</th><th style="text-align:center">Aksi</th></tr></thead><tbody id="usrTb"></tbody></table></div></div>
      <div class="mcw"><div id="usrMc" class="mcl"></div></div>`;
    filUsr();
  }catch(e){errPg(e.message);}
}
function filUsr(){
  var q=(document.getElementById('usrSrc')?.value||'').toLowerCase();
  var f=(window._ud||[]).filter(x=>!q||[x.username,x.name,x.email,x.role].some(v=>(v||'').toLowerCase().includes(q)));
  var roleColors={Admin:'bg-r',Manager:'bg-o',Supervisor:'bg-b',Cashier:'bg-g',User:'bg-x'};
  var tb=document.getElementById('usrTb');
  if(tb)tb.innerHTML=f.length?f.map(x=>`<tr><td><div style="font-weight:600;font-family:monospace;font-size:12px">${x.username}</div></td><td>${x.name}</td><td style="font-size:11px">${x.email||'-'}</td><td><span class="bg ${roleColors[x.role]||'bg-x'}">${x.role}</span></td><td><span class="bg ${x.active?'bg-g':'bg-r'}">${x.active?'Aktif':'Nonaktif'}</span></td><td style="text-align:center;white-space:nowrap"><button class="bs b" onclick="editUsr('${x.id}')"><i class="fas fa-edit"></i></button> <button class="bs r" onclick="delUsr('${x.id}','${esc(x.username)}')"><i class="fas fa-trash"></i></button></td></tr>`).join(''):'<tr><td colspan="6" class="es" style="padding:40px"><i class="fas fa-user-cog"></i><p>Tidak ada pengguna</p></td></tr>';
  var mc=document.getElementById('usrMc');
  if(mc)mc.innerHTML=f.length?f.map(x=>`<div class="mci"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-weight:600">${x.name}</div><div style="font-size:11px;color:#8899aa;font-family:monospace">@${x.username}</div></div><span class="bg ${roleColors[x.role]||'bg-x'}">${x.role}</span></div><div class="mci-tags"><span class="bg ${x.active?'bg-g':'bg-r'}">${x.active?'Aktif':'Nonaktif'}</span>${x.email?`<span class="bg bg-x" style="font-size:9px">${x.email}</span>`:''}</div><div class="mci-acts"><button class="bs b" onclick="editUsr('${x.id}')"><i class="fas fa-edit"></i> Edit</button><button class="bs r" onclick="delUsr('${x.id}','${esc(x.username)}')"><i class="fas fa-trash"></i> Hapus</button></div></div>`).join(''):'<div class="es"><i class="fas fa-user-cog"></i><p>Tidak ada pengguna</p></div>';
}
function usrForm(u,isEdit){
  return `<div class="grid grid-cols-2 gap-3">
    <div class="fg"><label>Username *</label><input type="text" id="ufUn" value="${u?esc(u.username||''):''}" placeholder="username" ${isEdit?'readonly style="opacity:.5"':''}></div>
    <div class="fg"><label>Password ${isEdit?'(kosongkan=tidak ganti)':'*'}</label><input type="password" id="ufPw" placeholder="${isEdit?'Kata sandi baru...':'Minimal 6 karakter'}"></div>
    <div class="fg" style="grid-column:span 2"><label>Nama Lengkap *</label><input type="text" id="ufNm" value="${u?esc(u.name||''):''}" placeholder="Nama lengkap"></div>
    <div class="fg"><label>Email</label><input type="email" id="ufEm" value="${u?esc(u.email||''):''}" placeholder="email@example.com"></div>
    <div class="fg"><label>Telepon</label><input type="tel" id="ufPh" value="${u?esc(u.phone||''):''}" placeholder="08xxxxxxxxxx"></div>
    <div class="fg"><label>Role *</label><select id="ufRl"><option value="User"${u?.role==='User'?' selected':''}>User</option><option value="Cashier"${u?.role==='Cashier'?' selected':''}>Cashier</option><option value="Admin"${u?.role==='Admin'?' selected':''}>Admin</option><option value="Supervisor"${u?.role==='Supervisor'?' selected':''}>Supervisor</option><option value="Manager"${u?.role==='Manager'?' selected':''}>Manager</option></select></div>
    ${isEdit?`<div class="fg"><label>Status</label><select id="ufAc"><option value="true"${u?.active?' selected':''}>Aktif</option><option value="false"${!u?.active?' selected':''}>Nonaktif</option></select></div>`:''}
  </div>`;
}
function addUsr(){opMd('Tambah Pengguna',usrForm(null,false),`<button class="bs" style="color:#8899aa" onclick="clMd()">Batal</button><button class="ba" onclick="svUsr(null)"><i class="fas fa-save"></i> Simpan</button>`);}
function editUsr(id){var u=(window._ud||[]).find(x=>x.id===id);if(!u)return;opMd('Edit Pengguna',usrForm(u,true),`<button class="bs" style="color:#8899aa" onclick="clMd()">Batal</button><button class="ba" onclick="svUsr('${id}')"><i class="fas fa-save"></i> Simpan</button>`);}
async function svUsr(id){
  var data={username:document.getElementById('ufUn')?.value?.trim(),password:document.getElementById('ufPw')?.value,name:document.getElementById('ufNm')?.value?.trim(),email:document.getElementById('ufEm')?.value?.trim(),phone:document.getElementById('ufPh')?.value?.trim(),role:document.getElementById('ufRl')?.value,active:document.getElementById('ufAc')?.value!=='false'};
  if(!data.name||(!id&&!data.username)){toast('Username dan nama wajib diisi','e');return;}
  if(!id&&!data.password){notify('w','Validasi','Password wajib diisi untuk pengguna baru');return;}
  try{var r=id?await gs('updateUser',id,data):await gs('addUser',data);if(r.success){notify('s',id?'Pengguna Diperbarui':'Pengguna Ditambahkan','@'+(data.username||'')+' berhasil '+(id?'diperbarui':'ditambahkan'));clMd();rdrUsr();}else notify('e','Gagal',r.message||'Terjadi kesalahan');}catch(e){notify('e','Error',e.message);}
}
function delUsr(id,username){confirmAct({icon:'fa-user-slash',danger:true,title:'Hapus Pengguna',msg:`Yakin ingin menghapus akun <strong>@${username}</strong>? Pengguna tidak dapat login setelah dihapus.`,label:'Ya, Hapus Akun',onConfirm:async function(){try{var r=await gs('deleteUser',id);if(r.success){notify('s','Akun Dihapus','@'+username+' berhasil dihapus dari sistem');rdrUsr();}else notify('e','Gagal',r.message);}catch(e){notify('e','Error',e.message);}}});}

// ── SCAN MEMBER ────────────────────────────
var _scanTab='recent';
async function rdrScan(){
  try{
    var c=document.getElementById('pgC');
    c.innerHTML=`
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mb-3">
        <div class="cc" style="text-align:center">
          <h3 style="margin-bottom:16px"><i class="fas fa-qrcode" style="color:#00bcd4;margin-right:6px"></i>Scan Kehadiran Member</h3>
          <div style="background:#111128;border:2px dashed #00bcd4;border-radius:14px;padding:28px 20px;margin-bottom:16px">
            <i class="fas fa-qrcode" style="font-size:52px;color:#00bcd4;opacity:.7;display:block;margin-bottom:12px"></i>
            <p style="color:#8899aa;font-size:12px;margin-bottom:14px">Arahkan scanner ke barcode/QR member<br>atau ketik ID Member lalu tekan Enter</p>
            <input id="scanInp" type="text" class="fi" placeholder="Scan atau ketik ID Member (contoh: MBR001)" style="font-size:15px;text-align:center;letter-spacing:2px;text-transform:uppercase" onkeydown="if(event.key==='Enter')doScan()" autocomplete="off" />
            <button class="btn" onclick="doScan()" style="width:100%;margin-top:10px;background:#00bcd4;font-size:13px"><i class="fas fa-sign-in-alt"></i> Rekam Kehadiran</button>
          </div>
          <div id="scanRes"></div>
        </div>
        <div class="cc">
          <div style="display:flex;gap:8px;margin-bottom:14px">
            <button class="bs ${_scanTab==='recent'?'g':''}" onclick="setScanTab('recent')" style="font-size:11px">Kunjungan Terbaru</button>
            <button class="bs ${_scanTab==='qr'?'g':''}" onclick="setScanTab('qr')" style="font-size:11px">QR Code Member</button>
          </div>
          <div id="scanTabC"><div style="text-align:center;padding:20px"><div class="loader"></div></div></div>
        </div>
      </div>`;
    setTimeout(()=>{
      var inp=document.getElementById('scanInp');
      if(inp)inp.focus();
    },150);
    ldScanTab();
  }catch(e){errPg(e.message);}
}

function setScanTab(t){
  _scanTab=t;
  document.querySelectorAll('.cc .bs').forEach(b=>{
    var isG=b.textContent.trim().startsWith(t==='recent'?'Kunjungan':'QR');
    b.className='bs '+(isG?'g':'');
  });
  ldScanTab();
}

async function ldScanTab(){
  var tc=document.getElementById('scanTabC');
  if(!tc)return;
  tc.innerHTML='<div style="text-align:center;padding:20px"><div class="loader"></div></div>';
  try{
    if(_scanTab==='recent'){
      var att=await gs('getAttendance','',50);
      if(!att.length){tc.innerHTML='<div class="es"><i class="fas fa-clipboard-list"></i><p>Belum ada kunjungan tercatat</p></div>';return;}
      tc.innerHTML='<div style="max-height:420px;overflow-y:auto">'+att.map(a=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(42,52,68,.3)">
          <div style="width:36px;height:36px;border-radius:10px;background:rgba(0,188,212,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="fas fa-user-check" style="color:#00bcd4;font-size:13px"></i>
          </div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600">${a.memberName}</div>
            <div style="font-size:10px;color:#8899aa">${a.memberId}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;font-weight:600;color:#00bcd4">${new Date(a.visitedAt).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}</div>
            <div style="font-size:10px;color:#8899aa">${new Date(a.visitedAt).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>`).join('')+'</div>';
    } else {
      var members=await gs('getAttendanceSummary');
      if(!members.length){tc.innerHTML='<div class="es"><i class="fas fa-users"></i><p>Tidak ada data member</p></div>';return;}
      tc.innerHTML='<div style="max-height:420px;overflow-y:auto"><div class="grid grid-cols-2 gap-2">'+members.map(m=>`
        <div style="background:#111128;border-radius:10px;padding:12px;text-align:center;cursor:pointer" onclick="showQr('${m.id}','${m.name}')">
          <div id="qr_${m.id}" style="display:inline-block;margin-bottom:6px"></div>
          <div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div>
          <div style="font-size:9px;color:#8899aa">${m.id}</div>
          <div style="font-size:9px;color:#00bcd4;margin-top:2px">${m.totalVisits} kunjungan</div>
        </div>`).join('')+'</div></div>';
      setTimeout(()=>{
        members.forEach(m=>{
          var el=document.getElementById('qr_'+m.id);
          if(el&&typeof QRCode!=='undefined'){
            new QRCode(el,{text:m.id,width:80,height:80,colorDark:'#6c63ff',colorLight:'#111128',correctLevel:QRCode.CorrectLevel.M});
          }
        });
      },100);
    }
  }catch(e){tc.innerHTML='<div class="es"><p>'+e.message+'</p></div>';}
}

async function doScan(){
  var inp=document.getElementById('scanInp');
  if(!inp)return;
  var memberId=inp.value.trim().toUpperCase();
  if(!memberId){toast('Masukkan ID Member','w');return;}
  var res=document.getElementById('scanRes');
  res.innerHTML='<div style="text-align:center;padding:12px"><div class="loader"></div></div>';
  try{
    var r=await gs('recordAttendance',memberId);
    var m=r.member;
    var now=new Date(r.visitedAt);
    var dateStr=now.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    var timeStr=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    res.innerHTML=`
      <div style="background:linear-gradient(135deg,rgba(0,188,212,.15),rgba(108,99,255,.15));border:1px solid #00bcd4;border-radius:12px;padding:20px;animation:fadeIn .3s ease">
        <div style="font-size:32px;margin-bottom:8px">✅</div>
        <div style="font-size:18px;font-weight:700;color:#00bcd4">${m.name}</div>
        <div style="font-size:12px;color:#8899aa;margin:4px 0">${m.id} • ${m.status||'Active'}</div>
        <div style="font-size:13px;margin-top:12px;color:#e0e0e0">${dateStr}</div>
        <div style="font-size:22px;font-weight:700;color:#00e676;letter-spacing:2px">${timeStr}</div>
        <div style="font-size:11px;color:#8899aa;margin-top:8px">Kehadiran berhasil direkam</div>
      </div>`;
    inp.value='';
    inp.focus();
    toast('Kehadiran '+m.name+' direkam!','s');
    if(_scanTab==='recent')setTimeout(ldScanTab,800);
  }catch(e){
    res.innerHTML=`<div style="background:rgba(255,82,82,.1);border:1px solid #ff5252;border-radius:12px;padding:20px"><div style="font-size:28px">❌</div><div style="color:#ff5252;font-weight:600;margin-top:8px">${e.message}</div></div>`;
    inp.select();
    toast(e.message,'e');
  }
}

function showQr(memberId, memberName){
  var h=`<div style="text-align:center;padding:16px">
    <div id="qrModal" style="display:inline-block;margin-bottom:12px"></div>
    <div style="font-size:16px;font-weight:700">${memberName}</div>
    <div style="font-size:12px;color:#8899aa;margin:4px 0">${memberId}</div>
    <p style="font-size:11px;color:#556677;margin-top:8px">Scan QR ini untuk rekam kehadiran</p>
  </div>`;
  opMd('QR Code - '+memberName,h);
  setTimeout(()=>{
    var el=document.getElementById('qrModal');
    if(el&&typeof QRCode!=='undefined')new QRCode(el,{text:memberId,width:180,height:180,colorDark:'#6c63ff',colorLight:'#1a1a2e',correctLevel:QRCode.CorrectLevel.H});
  },100);
}

// ── PROFILE ────────────────────────────────
async function rdrPrf(){
  try{
    var u=await gs('getProfile');
    var c=document.getElementById('pgC');
    c.innerHTML=`
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="cc" style="text-align:center;padding:32px">
          <div style="width:80px;height:80px;border-radius:20px;background:rgba(0,230,118,.1);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#00e676;margin:0 auto 16px">${(u.name||'A')[0].toUpperCase()}</div>
          <div style="font-size:18px;font-weight:700;margin-bottom:4px">${u.name}</div>
          <div style="font-size:12px;color:#8899aa;margin-bottom:8px">@${u.username}</div>
          <span class="bg bg-g">${u.role}</span>
          <div style="margin-top:16px;font-size:11px;color:#556677">Bergabung ${fd(u.createdAt)}</div>
        </div>
        <div class="cc lg:col-span-2">
          <h3 style="margin-bottom:20px"><i class="fas fa-edit" style="color:#00e676;margin-right:6px"></i>Edit Profil</h3>
          <div class="grid grid-cols-2 gap-3">
            <div class="fg" style="grid-column:span 2"><label>Nama Lengkap</label><input type="text" id="prNm" value="${esc(u.name||'')}"></div>
            <div class="fg"><label>Email</label><input type="email" id="prEm" value="${esc(u.email||'')}"></div>
            <div class="fg"><label>Telepon</label><input type="tel" id="prPh" value="${esc(u.phone||'')}"></div>
            <div class="fg" style="grid-column:span 2;border-top:1px solid var(--border);padding-top:14px;margin-top:4px"><label>Password Baru (kosongkan jika tidak ganti)</label><input type="password" id="prPw" placeholder="Masukkan password baru..."></div>
          </div>
          <button class="ba" onclick="svPrf()" style="margin-top:4px"><i class="fas fa-save"></i> Simpan Perubahan</button>
        </div>
      </div>`;
    gsap.fromTo('.cc',{opacity:0,y:20},{opacity:1,y:0,stagger:.1,duration:.4});
  }catch(e){errPg(e.message);}
}
async function svPrf(){
  var data={name:document.getElementById('prNm')?.value?.trim(),email:document.getElementById('prEm')?.value?.trim(),phone:document.getElementById('prPh')?.value?.trim(),password:document.getElementById('prPw')?.value};
  if(!data.password)delete data.password;
  if(!data.name){toast('Nama tidak boleh kosong','e');return;}
  try{var r=await gs('updateProfile',data);if(r.success){toast('Profil berhasil disimpan','s');S.u.name=data.name;document.getElementById('sbNm').textContent=data.name;var ini=data.name[0].toUpperCase();document.getElementById('avI').textContent=ini;document.getElementById('avT').textContent=ini;rdrPrf();}else toast(r.message||'Gagal','e');}catch(e){toast(e.message,'e');}
}

// ── Init ───────────────────────────────────
async function initApp(){
  document.getElementById('ldOv').style.display='none';
  document.getElementById('lgPg').style.display='none';
  document.getElementById('apPg').style.display='block';
  var ini=(S.u.name||'A')[0].toUpperCase();
  document.getElementById('avI').textContent=ini;
  document.getElementById('avT').textContent=ini;
  document.getElementById('sbNm').textContent=S.u.name;
  document.getElementById('sbRl').textContent=S.u.role;
  bldNav(); nav('dashboard'); ldNf();
  gsap.fromTo('#apPg',{opacity:0},{opacity:1,duration:.5});
  setInterval(ldNf,60000);
  window.addEventListener('resize',()=>bldNav());
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(S.npo)togNP();clMd();}});
  toast('Selamat datang, '+S.u.name,'s');
}

async function boot(){
  try{
    var r=await gs('checkSession');
    if(r.success){S.u=r.user;initApp();}else showLogin();
  }catch(e){showLogin();}
}

function showLogin(){
  document.getElementById('ldOv').style.display='none';
  document.getElementById('lgPg').style.display='flex';
  gsap.fromTo('.lc',{opacity:0,y:30,scale:.95},{opacity:1,y:0,scale:1,duration:.5,ease:'back.out(1.5)'});
  document.addEventListener('keydown',function h(e){if(e.key==='Enter'&&document.getElementById('lgPg').style.display!=='none'){doLogin();document.removeEventListener('keydown',h);}});
}

boot();
</script>
</body>
